name: Update wandas submodule

permissions:
  contents: write

on:
  repository_dispatch:
    types: [wandas-updated]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"  # 毎日 UTC 0:00（フォールバック）

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve target tag
        id: tag
        run: |
          cd wandas
          git fetch --tags
          PAYLOAD_TAG="${{ github.event.client_payload.tag }}"
          if [ -n "${PAYLOAD_TAG}" ]; then
            TARGET="${PAYLOAD_TAG}"
          else
            # スケジュール・手動実行時は最新リリースタグを使う
            TARGET=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          fi
          echo "tag=${TARGET}" >> $GITHUB_OUTPUT
          echo "Resolved tag: ${TARGET}"

      - name: Checkout release tag in submodule
        run: |
          cd wandas
          git checkout "${{ steps.tag.outputs.tag }}"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wandas
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update wandas submodule to ${{ steps.tag.outputs.tag }}"
          git push
